name: Linting

on:
  push:
  pull_request:
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  quality:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Setup Biome
        uses: biomejs/setup-biome@v2
        with:
          version: 2.4.16
      - name: Run Biome
        run: biome ci .
      - name: Verify inlined landing CSS
        run: npm run check:landing-css
